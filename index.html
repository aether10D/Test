<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>Aether 10D - Final Refined</title>
    <style>
        :root { --accent: #1a73e8; --border: #dadce0; --text-sub: #5f6368; }
        * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { margin: 0; display: flex; height: 100vh; overflow: hidden; background: #fff; }

        /* 側邊欄 */
        #sidebar { width: 260px; background: #f8f9fa; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .logo { padding: 24px; font-weight: 800; font-size: 22px; color: var(--accent); }
        .nav-link { padding: 12px 24px; cursor: pointer; color: var(--text-sub); border-radius: 0 24px 24px 0; margin-right: 12px; }
        .nav-link.active { background: #e8f0fe; color: var(--accent); font-weight: 600; }

        /* 主導航與工具欄 */
        main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        header { height: 64px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; }
        
        /* 麵包屑區域：支持滑動 */
        .bc-container { 
            flex: 1; display: flex; align-items: center; 
            overflow-x: auto; white-space: nowrap; scrollbar-width: none; 
        }
        .bc-container::-webkit-scrollbar { display: none; }
        
        .crumb-item { 
            cursor: pointer; color: var(--text-sub); padding: 6px 8px; border-radius: 4px; transition: 0.2s;
        }
        .crumb-item:hover { background: #f1f3f4; color: var(--accent); }
        .crumb-item.active { color: #202124; font-weight: 700; cursor: default; }

        .toolbar { display: flex; gap: 8px; align-items: center; }
        .t-btn { 
            height: 36px; padding: 0 16px; border: 1px solid var(--border); 
            background: #fff; border-radius: 18px; cursor: pointer; 
            font-size: 13px; font-weight: 600; display: flex; align-items: center;
        }
        .t-btn:hover { background: #f8f9fa; border-color: var(--accent); }
        .t-btn.primary { background: var(--accent); color: #fff; border: none; }
        .t-btn.danger { color: #d93025; }

        /* 內容區 */
        .viewport { flex: 1; overflow-y: auto; padding: 20px; }
        .list-row { 
            display: grid; grid-template-columns: 2fr 1fr 120px; 
            align-items: center; padding: 0 16px; height: 52px; 
            border-bottom: 1px solid #f1f3f4; cursor: pointer; border-radius: 8px;
        }
        .list-row.selected { background: #e8f0fe; }
        .list-row svg { width: 24px; height: 24px; margin-right: 12px; vertical-align: middle; }

        .edit-box { display: flex; gap: 10px; padding: 10px; border: 2px solid var(--accent); border-radius: 10px; background: #fff; margin-bottom: 12px; }
        .edit-box input { flex: 1; border: none; outline: none; font-size: 15px; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="logo">Aether 10D</div>
    <div style="padding: 0 16px 20px;">
        <button class="t-btn primary" style="width:100%; height:44px; justify-content:center;" onclick="document.getElementById('f-up').click()">上傳文件</button>
        <button class="t-btn" style="width:100%; height:44px; justify-content:center; margin-top:10px;" onclick="startCreate()">新建資料夾</button>
        <input type="file" id="f-up" style="display:none" onchange="handleUpload(this)">
    </div>
    <div class="nav-link active" id="n-drive" onclick="switchTab('drive')">我的硬碟</div>
    <div class="nav-link" id="n-recent" onclick="switchTab('recent')">最近項目</div>
    <div class="nav-link" id="n-trash" onclick="switchTab('trash')">垃圾桶</div>
</aside>

<main>
    <header>
        <div id="bc-ui" class="bc-container"></div>
        <div id="toolbar" class="toolbar"></div>
    </header>
    <div id="v-port" class="viewport"></div>
</main>

<script>
    let db = [
        {id: 1, name: '10D_Algorithm.bin', isDir: false, parent: '我的硬碟', del: false},
        {id: 2, name: '開發文檔', isDir: true, parent: '我的硬碟', del: false}
    ];
    let currentMode = 'drive', drivePath = ["我的硬碟"];
    let sel = new Set(), creating = false, renamingId = null, clip = { type: null, ids: [] };

    const SVG_DIR = `<svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z" fill="#FFC107"/></svg>`;
    const SVG_FILE = `<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z" fill="#1A73E8"/></svg>`;

    function render() {
        const vp = document.getElementById('v-port'), tb = document.getElementById('toolbar'), bc = document.getElementById('bc-ui');
        vp.innerHTML = ""; tb.innerHTML = ""; bc.innerHTML = "";

        // --- 1. 麵包屑導航 (點擊傳送 & 滑動) ---
        const activePath = (currentMode === 'drive') ? drivePath : [currentMode==='recent'?'最近項目':'垃圾桶'];
        activePath.forEach((name, idx) => {
            const item = document.createElement('div');
            item.className = `crumb-item ${idx === activePath.length - 1 ? 'active' : ''}`;
            item.innerText = name;
            item.onclick = (e) => {
                if (currentMode === 'drive' && idx < drivePath.length - 1) {
                    drivePath = drivePath.slice(0, idx + 1); // 傳送回指定路徑
                    sel.clear(); render();
                }
            };
            bc.appendChild(item);
            if (idx < activePath.length - 1) {
                const sep = document.createElement('span');
                sep.innerText = " / "; sep.style.color = "#ccc";
                bc.appendChild(sep);
            }
        });
        setTimeout(() => bc.scrollLeft = bc.scrollWidth, 50);

        // --- 2. 列表渲染邏輯 ---
        const parentName = drivePath[drivePath.length-1];
        let items = (currentMode === 'drive') ? db.filter(x => x.parent === parentName && !x.del) 
                  : (currentMode === 'recent' ? db.filter(x => !x.del && !x.isDir) : db.filter(x => x.del));

        if (creating) vp.appendChild(createEditRow("", true, n => {
            if(!checkName(n)) return alert("此名稱已存在！");
            db.unshift({id:Date.now(), name:n, isDir:true, parent:parentName, del:false});
            creating = false; render();
        }, () => { creating=false; render(); }));

        items.forEach(i => {
            if (renamingId === i.id) {
                vp.appendChild(createEditRow(i.name, i.isDir, n => {
                    if(i.name !== n && !checkName(n)) return alert("名稱重複！");
                    i.name = n; renamingId = null; render();
                }, () => { renamingId = null; render(); }));
            } else {
                const r = document.createElement('div');
                r.className = `list-row ${sel.has(i.id)?'selected':''}`;
                r.onclick = () => { sel.has(i.id) ? sel.delete(i.id) : sel.add(i.id); render(); };
                r.ondblclick = () => { if(i.isDir && currentMode==='drive') { drivePath.push(i.name); sel.clear(); render(); } };
                r.innerHTML = `<div>${i.isDir?SVG_DIR:SVG_FILE} ${i.name}</div><div>剛剛</div><div>--</div>`;
                vp.appendChild(r);
            }
        });

        // --- 3. 工具欄：根據單選/多選精確切換 ---
        if (sel.size > 0) {
            const multi = sel.size > 1;
            if (currentMode === 'drive') {
                if (!multi) {
                    // 單選：重命名, 移動, 複製, 刪除
                    tb.innerHTML += `<button class="t-btn" onclick="startRename()">重命名</button>`;
                    tb.innerHTML += `<button class="t-btn" onclick="setClip('move')">移動</button>`;
                    tb.innerHTML += `<button class="t-btn" onclick="setClip('copy')">複製</button>`;
                } else {
                    // 多選：批量移動, 批量複製, 批量刪除
                    tb.innerHTML += `<button class="t-btn" onclick="setClip('move')">批量移動</button>`;
                    tb.innerHTML += `<button class="t-btn" onclick="setClip('copy')">批量複製</button>`;
                }
                tb.innerHTML += `<button class="t-btn danger" onclick="batchDel()">${multi?'批量':''}刪除</button>`;
                tb.innerHTML += `<button class="t-btn" onclick="sel.clear(); render()">取消選中</button>`;
            } else if (currentMode === 'trash') {
                tb.innerHTML += `<button class="t-btn primary" onclick="batchRestore()">復原項</button>`;
            }
        }

        if (clip.ids.length > 0 && currentMode === 'drive') {
            tb.innerHTML += `<button class="t-btn primary" onclick="pasteItems()">貼上到此處 (${clip.ids.length})</button>`;
            tb.innerHTML += `<button class="t-btn" onclick="cancelClip()">取消操作</button>`;
        }
    }

    // --- 功能函式 ---
    function checkName(name) { return !db.some(x => x.parent === drivePath[drivePath.length-1] && x.name === name && !x.del); }
    function startCreate() { creating = true; render(); }
    function startRename() { renamingId = Array.from(sel)[0]; render(); }
    function setClip(t) { clip = { type: t, ids: Array.from(sel) }; sel.clear(); render(); }
    function cancelClip() { clip = { type: null, ids: [] }; render(); }
    function batchDel() { sel.forEach(id => db.find(x=>x.id===id).del = true); sel.clear(); render(); }
    function batchRestore() { sel.forEach(id => db.find(x=>x.id===id).del = false); sel.clear(); render(); }

    function pasteItems() {
        const cur = drivePath[drivePath.length-1];
        clip.ids.forEach(id => {
            let item = db.find(x => x.id === id);
            if(clip.type === 'move') {
                if(checkName(item.name)) item.parent = cur;
                else alert(`名稱 [${item.name}] 已存在，跳過移動`);
            } else {
                let name = item.name + "_副本";
                db.unshift({...item, id: Date.now()+Math.random(), name, parent: cur});
            }
        });
        cancelClip();
    }

    function handleUpload(el) {
        if (!el.files[0]) return;
        let name = el.files[0].name, finalName = name, count = 1;
        while (!checkName(finalName)) {
            let pts = name.split('.');
            if (pts.length > 1) { let ext = pts.pop(); finalName = `${pts.join('.')}(${count++}).${ext}`; }
            else { finalName = `${name}(${count++})`; }
        }
        db.unshift({id: Date.now(), name: finalName, isDir: false, parent: drivePath[drivePath.length-1], del: false});
        render();
    }

    function createEditRow(val, isDir, done, cancel) {
        const div = document.createElement('div'); div.className = 'edit-box';
        div.innerHTML = `${isDir?SVG_DIR:SVG_FILE}<input value="${val}" autofocus onfocus="this.select()">`;
        const b1 = document.createElement('button'); b1.className = 't-btn primary'; b1.innerText = '儲存';
        b1.onclick = () => done(div.querySelector('input').value);
        const b2 = document.createElement('button'); b2.className = 't-btn'; b2.innerText = '取消';
        b2.onclick = cancel;
        div.append(b1, b2);
        return div;
    }

    function switchTab(m) { currentMode = m; if(m==='drive') drivePath=["我的硬碟"]; sel.clear(); render(); document.querySelectorAll('.nav-link').forEach(l=>l.classList.toggle('active', l.id==='n-'+m)); }
    window.onload = render;
</script>
</body>
</html>
