<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AETHER 10D ARCHITECT · 白色胶囊 (标签式多窗口)</title>
  <style>
    :root {
      --bg: #ffffff;
      --border: #e8e8ed;
      --text: #1d1d1f;
      --sub: #6e6e73;
      --accent: #0071e3;
      --accent-light: #e3f0ff;
      --accent-soft: rgba(0,113,227,0.08);
      --danger: #d93025;
      --folder: #f5b800;
      --file: #0071e3;
      --side-w: 260px;
      --side-min: 72px;
      --radius: 20px;
      --card-gap: 16px;
      --card-min: clamp(160px, 24vw, 260px);
    }
    * { box-sizing:border-box; margin:0; }
    body { font-family:"Segoe UI","PingFang TC",sans-serif; display:flex; height:100vh; overflow:hidden; color:var(--text); background:#ffffff; }
    #sidebar { width:var(--side-w); border-right:1px solid var(--border); display:flex; flex-direction:column; transition:width 0.2s; flex-shrink:0; background:#ffffff; }
    #sidebar.collapsed { width:var(--side-min); }
    .brand { height:90px; display:flex; align-items:center; justify-content:center; cursor:pointer; border-bottom:1px solid var(--border); }
    .logo-img { width:56px; height:56px; border-radius:16px; object-fit:cover; border:1px solid var(--border); transition:transform 0.3s; }
    .logo-img.rotate { transform:rotate(360deg); }
    .sidebar-tools { padding:16px 12px; display:flex; flex-direction:column; gap:8px; border-bottom:1px solid var(--border); }
    .sidebar-btn { height:44px; border:1px solid var(--border); border-radius:var(--radius); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; font-size:14px; font-weight:500; padding:0 16px; white-space:nowrap; background:#ffffff; color:var(--text); transition:0.2s; }
    .sidebar-btn:hover { background:#f5f5f7; border-color:var(--accent); }
    .sidebar-btn.primary { background:var(--accent); color:white; border:1px solid var(--accent); }
    .sidebar-btn.primary:hover { background:#0066d6; }
    .sidebar-btn.disabled { opacity:0.5; background:#fafafa; border-color:var(--border); color:var(--sub); pointer-events:none; }
    .sidebar-btn svg { stroke:currentColor; flex-shrink:0; }
    .sidebar-btn span { white-space:nowrap; }
    #sidebar.collapsed .sidebar-btn span { display:none; }
    #sidebar.collapsed .sidebar-btn { padding:0; justify-content:center; width:44px; border-radius:50%; }
    #sidebar.collapsed .sidebar-btn svg { margin:0; }
    .nav-section { flex:1; padding-top:12px; }
    .nav-item { height:48px; display:flex; align-items:center; cursor:pointer; color:var(--sub); margin:4px 12px 4px 0; border-radius:0 var(--radius) var(--radius) 0; transition:0.15s; }
    .nav-item:hover { background:#f5f5f7; color:var(--accent); }
    .nav-item.active { background:var(--accent-light); color:var(--accent); font-weight:500; }
    .nav-icon { width:72px; height:48px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .nav-text { white-space:nowrap; font-size:14px; }
    #sidebar.collapsed .nav-text { display:none; }
    main { flex:1; display:flex; flex-direction:column; min-width:0; background:#ffffff; }
    header { height:64px; padding:0 24px; display:flex; align-items:center; border-bottom:1px solid var(--border); background:#ffffff; }
    .breadcrumb { display:flex; align-items:center; gap:8px; color:var(--sub); overflow-x:auto; white-space:nowrap; flex:1; }
    .breadcrumb span { cursor:pointer; padding:4px 12px; border-radius:var(--radius); background:transparent; transition:0.15s; }
    .breadcrumb span:hover { background:#f5f5f7; }
    .breadcrumb span:last-child { color:var(--text); font-weight:500; cursor:default; background:transparent; }
    .toolbar { height:64px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); background:#ffffff; }
    .tool-group { display:flex; align-items:center; gap:10px; }
    .search-box { border:1px solid var(--border); border-radius:var(--radius); padding:0 16px; display:flex; align-items:center; height:40px; width:260px; background:#ffffff; }
    .search-box:focus-within { border-color:var(--accent); box-shadow:0 0 0 2px rgba(0,113,227,0.15); }
    .search-box input { background:transparent; border:none; padding:0 8px; width:100%; font-size:14px; outline:none; }
    .t-btn { height:40px; border:1px solid var(--border); padding:0 20px; border-radius:var(--radius); cursor:pointer; font-size:14px; font-weight:500; display:flex; align-items:center; gap:8px; background:#ffffff; color:var(--text); transition:0.15s; }
    .t-btn:hover { background:#f5f5f7; border-color:var(--accent); }
    .t-btn.primary { background:#cce1ff; color:#1a4fa9; border:1px solid #1a4fa9; }
    .t-btn.primary:hover { background:#b8d5ff; }
    .t-btn.danger { color:var(--danger); border-color:#fce8e6; }
    .t-btn.danger:hover { background:#fff0f0; }
    .view-toggle { display:flex; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-right:12px; }
    .view-btn { height:36px; width:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; background:transparent; border:none; color:var(--sub); transition:0.15s; }
    .view-btn.active { background:var(--accent-light); color:var(--accent); }
    .content-pane { flex:1; overflow:hidden; position:relative; }
    #tabs-bar { height:40px; display:flex; align-items:center; border-bottom:1px solid var(--border); background:#f9f9fb; overflow-x:auto; white-space:nowrap; }
    #tabs-bar .tab { display:inline-flex; align-items:center; height:32px; padding:0 12px; margin:0 2px; border-radius:12px; cursor:pointer; background:transparent; transition:0.15s; font-size:13px; user-select:none; }
    #tabs-bar .tab:hover { background:rgba(0,0,0,0.04); }
    #tabs-bar .tab.active { background:var(--accent-light); color:var(--accent); font-weight:500; }
    #tabs-bar .tab.minimized { opacity:0.6; font-style:italic; }
    #tabs-bar .tab-close { margin-left:8px; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:none; background:transparent; cursor:pointer; color:var(--sub); font-size:14px; }
    #tabs-bar .tab-close:hover { background:rgba(0,0,0,0.1); }
    .viewport { position:absolute; top:0; left:0; right:0; bottom:0; overflow-y:auto; padding:24px; background:#ffffff; }
    .viewport.slide-up { transform: translateY(-20px); opacity: 0; transition: transform 0.25s ease, opacity 0.25s ease; }
    .preview-window { position:absolute; background:#ffffff; border:1px solid var(--border); border-radius:16px; box-shadow:0 8px 30px rgba(0,0,0,0.12); display:flex; flex-direction:column; min-width:300px; min-height:200px; z-index:50; overflow:hidden; transition: box-shadow 0.15s; }
    .preview-window.active { z-index:100; box-shadow:0 16px 48px rgba(0,0,0,0.18); }
    .preview-window.maximized { position:fixed; top:0; left:0; width:100vw; height:100vh; border-radius:0; z-index:200; }
    .preview-window-header { height:44px; padding:0 16px; display:flex; align-items:center; justify-content:space-between; cursor:move; user-select:none; background:#f5f5f7; border-bottom:1px solid var(--border); }
    .preview-window.maximized .preview-window-header { cursor:default; }
    .preview-window-title { font-weight:600; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px; }
    .preview-window-actions { display:flex; align-items:center; gap:6px; }
    .preview-window-actions button { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; background:transparent; color:var(--sub); transition:0.15s; }
    .preview-window-actions button:hover { background:rgba(0,0,0,0.08); }
    .preview-window-content { flex:1; overflow:auto; padding:16px; display:flex; flex-direction:column; align-items:center; }
    .preview-window-content img { max-width:100%; height:auto; border-radius:12px; }
    .preview-window-content video,.preview-window-content audio { max-width:100%; }
    .preview-window-content pre { white-space:pre-wrap; word-break:break-word; font-family:monospace; background:#f5f5f7; padding:16px; border-radius:16px; width:100%; font-size:16px; }
    .preview-window-content textarea { width:100%; flex:1; border:1px solid var(--border); border-radius:16px; padding:16px; font-family:monospace; font-size:16px; resize:vertical; min-height:200px; }
    .preview-unsupported { color:var(--sub); text-align:center; margin-top:40px; }
    .resize-handle-corner { position:absolute; right:0; bottom:0; width:20px; height:20px; cursor:nwse-resize; background:transparent; }
    .resize-handle-edge { position:absolute; background:transparent; }
    .resize-handle-right { right:-3px; top:0; bottom:0; width:6px; cursor:e-resize; }
    .resize-handle-bottom { left:0; right:0; bottom:-3px; height:6px; cursor:s-resize; }
    .resize-handle-left { left:-3px; top:0; bottom:0; width:6px; cursor:w-resize; }
    .resize-handle-top { top:-3px; left:0; right:0; height:6px; cursor:n-resize; }
    .resize-handle-corner:hover { background:rgba(0,113,227,0.15); }
    .edit-actions-bar { display:none; gap:8px; align-items:center; margin-top:12px; }
    .edit-actions-bar button { height:32px; padding:0 14px; border-radius:var(--radius); border:1px solid var(--border); background:#ffffff; font-size:13px; cursor:pointer; }
    .edit-actions-bar button:hover { background:#f5f5f7; }
    .edit-actions-bar .save-btn { background:var(--accent); color:white; border-color:var(--accent); }
    .empty-state { text-align:center; color:#9aa0a6; margin-top:100px; font-size:14px; }
    .card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(var(--card-min),1fr)); gap:var(--card-gap); }
    .card-item { border:1px solid var(--border); border-radius:20px; padding:16px; cursor:pointer; transition:0.2s; background:#ffffff; display:flex; flex-direction:column; position:relative; user-select:none; }
    .card-item:hover:not(.locked) { border-color:var(--accent); box-shadow:0 8px 20px rgba(0,0,0,0.04); }
    .card-item.selected { background:#f0f5ff; border-color:var(--accent); }
    .card-item.locked { opacity:0.5; pointer-events:none; filter:grayscale(0.5); }
    .card-preview { height:100px; border-radius:14px; overflow:hidden; display:flex; align-items:center; justify-content:center; background:#ffffff; margin-bottom:12px; pointer-events:none; }
    .card-preview img { width:100%; height:100%; object-fit:cover; }
    .card-preview embed { width:500%; height:500%; transform:scale(0.2); transform-origin:top left; border:none; pointer-events:none; }
    .card-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:center; cursor:text; margin-top:4px; }
    .folder-preview { display:flex; align-items:center; justify-content:center; }
    .list-header { display:grid; grid-template-columns:1fr 200px 100px; padding:12px 16px; font-size:12px; color:var(--sub); border-bottom:1px solid var(--border); font-weight:500; }
    .row { display:grid; grid-template-columns:1fr 200px 100px; padding:0 16px; height:48px; align-items:center; border-radius:12px; cursor:pointer; margin-bottom:2px; transition:0.15s; }
    .row:hover:not(.locked) { background:#f5f5f7; }
    .row.selected { background:#f0f5ff; }
    .row.locked { opacity:0.5; pointer-events:none; }
    .svg-icon { width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .folder-icon { color:var(--folder); fill:var(--folder); stroke:none; }
    .file-glass-icon { width:24px; height:24px; flex-shrink:0; }
    .file-glass-icon-large { width:48px; height:48px; flex-shrink:0; }
    .file-glass-icon-xlarge { width:80px; height:80px; flex-shrink:0; }
    .inline-input { border:1.5px solid var(--accent); padding:4px 10px; border-radius:12px; width:100%; font-size:inherit; background:#ffffff; outline:none; }
    #toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#1d1d1f; color:white; padding:12px 24px; border-radius:40px; font-size:13px; display:none; z-index:1000; box-shadow:0 8px 24px rgba(0,0,0,0.15); pointer-events:none; }
    #toast.error { background:var(--danger); }
    .error-modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center; z-index:2000; }
    .error-modal.show { display:flex; }
    .error-modal-content { background:#ffffff; border-radius:24px; padding:28px; max-width:500px; width:90%; box-shadow:0 20px 40px rgba(0,0,0,0.15); }
    .error-modal-title { font-size:18px; font-weight:600; margin-bottom:12px; color:var(--danger); }
    .error-modal-body { font-size:14px; color:var(--text); margin-bottom:20px; white-space:pre-wrap; max-height:300px; overflow-y:auto; background:#f5f5f7; padding:12px; border-radius:12px; font-family:monospace; }
    .error-modal-buttons { display:flex; gap:10px; justify-content:flex-end; }
    .error-modal-buttons button { padding:8px 20px; border-radius:var(--radius); border:1px solid var(--border); background:#ffffff; cursor:pointer; font-size:14px; }
    .error-modal-buttons .copy-btn { background:var(--accent); color:white; border-color:var(--accent); }
    .card-item.inhale { transition:transform 0.38s cubic-bezier(0.25,0.46,0.45,0.94),opacity 0.28s ease-in; pointer-events:none; }
    .folder-item.drag-active { transform:scale(1.05); border-color:var(--accent); box-shadow:0 20px 30px -12px rgba(0,0,0,0.15); }
    .jelly-anim { animation:folderJelly 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes folderJelly { 0%{transform:scale(1);} 30%{transform:scale(1.12,0.86);} 55%{transform:scale(0.94,1.06);} 100%{transform:scale(1);} }
    .home-container { padding:24px; }
    .home-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:20px; }
    .home-card { background:#ffffff; border:1px solid var(--border); border-radius:20px; padding:20px; transition:0.2s; }
    .home-card:hover { border-color:var(--accent); box-shadow:0 4px 12px rgba(0,113,227,0.1); }
    .home-card-header { display:flex; align-items:center; gap:12px; }
    .home-card-icon { width:44px; height:44px; border-radius:14px; display:flex; align-items:center; justify-content:center; background:#f5f5f7; }
    .home-card-title { font-weight:600; font-size:16px; }
    .category-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
    .category-card { background:#ffffff; border:1px solid var(--border); border-radius:18px; padding:16px; cursor:pointer; transition:0.15s; text-align:center; }
    .category-card:hover { border-color:var(--accent); background:#f5f5f7; }
    .category-card svg { width:32px; height:32px; margin-bottom:8px; }
    .cat-label { font-size:14px; font-weight:500; }
    .recent-item { display:flex; align-items:center; gap:12px; padding:8px 0; border-radius:12px; cursor:pointer; }
    .recent-item:hover { background:#f5f5f7; }
    .tag { background:var(--accent-soft); color:var(--accent); padding:2px 8px; border-radius:12px; font-size:12px; }
    .flex-row { display:flex; align-items:center; gap:8px; }
    .refresh-btn { width:40px; height:40px; border:1px solid var(--border); border-radius:var(--radius); background:#ffffff; cursor:pointer; display:none; align-items:center; justify-content:center; transition:0.15s; }
    .refresh-btn:hover { background:#f5f5f7; border-color:var(--accent); }
    .refresh-btn svg { stroke:var(--sub); }
  </style>
</head>
<body>
<div id="toast"></div>
<div class="error-modal" id="error-modal">
  <div class="error-modal-content">
    <div class="error-modal-title">發生錯誤</div>
    <div class="error-modal-body" id="error-modal-body"></div>
    <div class="error-modal-buttons">
      <button class="copy-btn" id="error-copy-btn">複製錯誤</button>
      <button id="error-close-btn">關閉</button>
    </div>
  </div>
</div>

<aside id="sidebar">
  <div class="brand" onclick="App.toggleSidebar()"><img src="IMG_1978.jpeg" class="logo-img" id="logo-img" alt="Logo" onerror="this.style.display='none'"></div>
  <div class="sidebar-tools">
    <button id="btn-upload" class="sidebar-btn primary" title="上傳文件">
      <svg class="svg-icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span>上傳文件</span>
    </button>
    <button id="btn-newfolder" class="sidebar-btn" title="建立文件夾">
      <svg class="svg-icon folder-icon" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
      <span>建立文件夾</span>
    </button>
  </div>
  <div class="nav-section">
    <div class="nav-item active" id="menu-home" onclick="App.switchTab('home')"><div class="nav-icon"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><div class="nav-text">首頁</div></div>
    <div class="nav-item" id="menu-drive" onclick="App.switchTab('drive')"><div class="nav-icon"><svg class="svg-icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="7" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="17" cy="12" r="1.5"/><path d="M9 5l1-1h4l1 1"/></svg></div><div class="nav-text">我的硬碟</div></div>
    <div class="nav-item" id="menu-recent" onclick="App.switchTab('recent')"><div class="nav-icon"><svg class="svg-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="nav-text">最近項目</div></div>
    <div class="nav-item" id="menu-trash" onclick="App.switchTab('trash')"><div class="nav-icon"><svg class="svg-icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div><div class="nav-text">垃圾桶</div></div>
  </div>
</aside>
<main>
  <header id="header-bar"><div class="breadcrumb" id="breadcrumb"></div></header>
  <div class="toolbar">
    <div class="tool-group" id="tool-left"></div>
    <div class="tool-group">
      <div class="view-toggle" id="view-toggle" style="display:flex;">
        <button class="view-btn active" id="view-list" onclick="App.setView('list')" title="列表檢視"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
        <button class="view-btn" id="view-card" onclick="App.setView('card')" title="卡片檢視"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></button>
      </div>
      <div class="search-box"><input type="text" placeholder="搜尋檔案..." id="search-inp"></div>
      <button class="refresh-btn" id="refresh-btn" title="刷新" onclick="App.refresh()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
    </div>
  </div>
  <div id="tabs-bar"></div>
  <div class="content-pane" id="content-pane">
    <div class="viewport" id="main-view"></div>
  </div>
</main>
<input type="file" id="file-up" style="display:none" multiple>

<script>
(function(){
  // ==================== 错误处理 ====================
  const errorModal = document.getElementById('error-modal');
  const errorBody = document.getElementById('error-modal-body');
  let lastError = '';
  function showErrorModal(msg) { lastError = msg; errorBody.textContent = msg; errorModal.classList.add('show'); }
  function hideErrorModal() { errorModal.classList.remove('show'); }
  document.getElementById('error-close-btn').addEventListener('click', hideErrorModal);
  document.getElementById('error-copy-btn').addEventListener('click', () => {
    navigator.clipboard?.writeText(lastError).catch(() => {
      const ta = document.createElement('textarea'); ta.value = lastError;
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    });
    showToast('錯誤信息已複製');
  });
  window.onerror = (msg, src, line) => { showErrorModal(`系統錯誤：${msg}\n來源：${src}\n行：${line}`); return true; };
  window.addEventListener('unhandledrejection', e => { showErrorModal(`未處理的Promise錯誤：${e.reason}`); e.preventDefault(); });

  // ==================== 工具 ====================
  const escapeHtml = (t) => t ? String(t).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])) : '';
  const uid = (() => { let n=0; return (p) => `${p}-${++n}-${Math.random().toString(36).slice(2,8)}`; })();
  function makeFolderIcon(cls) {
    const pre = uid('fld');

  function getTopIds(ids) { return ids.filter(id => { let cur = db.find(x => x.id === id); while (cur && cur.pid !== '0') { if (ids.includes(cur.pid)) return false; cur = db.find(x => x.id === cur.pid); } return true; }); }

  async function generateThumb(fileItem) {
    if (!fileItem.content || fileItem.content.length === 0) return null;
    const ext = fileItem.name.split('.').pop().toLowerCase();
    const blob = new Blob([fileItem.content]);
    const maxW = 280, maxH = 200, quality = 0.9;
    if (IMG.has(ext)) {
      return new Promise(res => {
        const img = new Image(); const url = URL.createObjectURL(blob);
        img.onload = () => { const cvs = document.createElement('canvas'); let w = img.width, h = img.height; if (w > maxW) { h *= maxW/w; w = maxW; } if (h > maxH) { w *= maxH/h; h = maxH; } cvs.width = w; cvs.height = h; cvs.getContext('2d').drawImage(img, 0, 0, w, h); URL.revokeObjectURL(url); res(cvs.toDataURL('image/jpeg', quality)); };
        img.onerror = () => { URL.revokeObjectURL(url); res(null); };
        img.src = url;
      });

        const video = document.createElement('video');

        video.playsInline = true;
        const url = URL.createObjectURL(blob);
        video.src = url;
        video.addEventListener('loadeddata', () => {

          const cvs = document.createElement('canvas'); cvs.width = maxW; cvs.height = maxH;

          URL.revokeObjectURL(url);
          res(cvs.toDataURL('image/jpeg', quality));

        if (el.classList.contains('resize-handle-corner') || el.classList.contains('resize-handle-bottom')) dirs.push('bottom');
        if (el.classList.contains('resize-handle-left')) dirs.push('left');

        function onMove(ev) {

          if (s.dirs.includes('bottom')) h = Math.max(200, s.height + ev.clientY - s.startY);
          if (s.dirs.includes('left')) { w = Math.max(300, s.width - (ev.clientX - s.startX)); l = s.left + (ev.clientX - s.startX); }
          if (s.dirs.includes('top')) { h = Math.max(200, s.height - (ev.clientY - s.startY)); t = s.top + (ev.clientY - s.startY); }

          win.style.height = h + 'px';
          if (s.dirs.includes('left')) win.style.left = l + 'px';

        document.addEventListener('mouseup', onUp);

      } else {
        const ta = content.querySelector('textarea');
        if (ta) { item.content = new TextEncoder().encode(ta.value); item.size = item.content.length; item.time = Date.now(); thumbCache.delete(item.id); showToast('已保存'); }
      }
    });
    bar.querySelector('.cancel-btn').addEventListener('click', () => loadPreviewContent(item, win, content));
    const ext = item.name.split('.').pop().toLowerCase();
    if (IMG.has(ext)) {
      const img = content.querySelector('img');
      if (img && url) {
        const cvs = document.createElement('canvas'); cvs.width = img.naturalWidth; cvs.height = img.naturalHeight;
        cvs.getContext('2d').drawImage(img, 0, 0);
        content.innerHTML = ''; content.appendChild(cvs);
        content.appendChild(bar);
        let painting = false;
        cvs.onmousedown = e => { painting = true; cvs.getContext('2d').beginPath(); cvs.getContext('2d').moveTo(e.offsetX, e.offsetY); };
        cvs.onmouseup = () => painting = false;
        cvs.onmouseleave = () => painting = false;
        cvs.onmousemove = e => { if (!painting) return; const ctx = cvs.getContext('2d'); ctx.lineTo(e.offsetX, e.offsetY); ctx.strokeStyle = 'red'; ctx.lineWidth = 2; ctx.stroke(); };
      }
    } else {
      const pre = content.querySelector('pre');
      if (pre) {
        const text = pre.textContent;
        content.innerHTML = '';
        const ta = document.createElement('textarea'); ta.value = text;
        content.appendChild(ta); content.appendChild(bar);
      }
    }
  }

  function showPreview(item) {
    createWindow(item);
  }

  // ==================== 主点击逻辑 ====================
  document.getElementById('main-view').addEventListener('click', function(e) {
    if (curTab === 'home') return;
    if (longPressActive) { longPressActive = false; return; }
    const target = e.target.closest('.row, .card-item');
    if (!target) { if (editId) { commitEdit(); render(); } if (selection.size > 0) { selection.clear(); syncSel(); updateToolbar(); } lastClickId = null; return; }
    const id = target.getAttribute('data-id'); if (!id) return;
    if (e.target.closest('.card-name') || (e.target.closest('.row') && e.target.closest('span'))) { e.stopPropagation(); if (editId === id) return; if (editId) commitEdit(); editId = id; render(); return; }
    if (e.target.tagName === 'INPUT') return;
    if (editId && editId !== id) { commitEdit(); render(); return; }
    const now = Date.now();
    if (id === lastClickId && (now - lastClickTime) < DBL_CLICK_MS) {
      lastClickId = null;
      const item = db.find(x => x.id === id); if (!item || target.classList.contains('locked')) return;
      if (curTab === 'trash') { showToast('垃圾桶內項目無法開啟'); return; }
      if (curTab === 'recent') { if (item.type === 'file') { selection.clear(); syncSel(); updateToolbar(); showPreview(item); } else showToast('最近項目僅供檢視'); return; }
      if (filterCat) { if (item.type === 'file') showPreview(item); return; }
      selection.clear(); syncSel(); updateToolbar();
      if (item.type === 'dir' && curTab === 'drive') { searchInput.value = ''; searchQuery = ''; pathStack.push({id:item.id, name:item.name}); render(); }
      else if (item.type === 'file') showPreview(item);
      return;
    }
    lastClickId = id; lastClickTime = now;
    if (selection.has(id)) selection.delete(id); else selection.add(id);
    syncSel(); updateToolbar();
  });

  function syncSel() { document.querySelectorAll('.row,.card-item').forEach(el => el.classList.remove('selected')); selection.forEach(id => { const r = document.querySelector(`.row[data-id="${id}"]`); if(r) r.classList.add('selected'); const c = document.querySelector(`.card-item[data-id="${id}"]`); if(c) c.classList.add('selected'); }); }

  function updateToolbar() {
    const left = document.getElementById('tool-left'); left.innerHTML = '';
    const refresh = document.getElementById('refresh-btn'); if(refresh) refresh.style.display = 'none';
    if (curTab === 'home' || curTab === 'recent') return;
    if (filterCat) { left.appendChild(btn('返回首頁', () => { filterCat = null; App.switchTab('home'); }, true)); return; }
    if (selection.size > 0) {
      if (curTab === 'trash') {
        left.appendChild(btn('還原', () => { getTopIds([...selection]).forEach(id => restoreItem(id)); selection.clear(); syncSel(); render(); }, true));
        left.appendChild(btn('永久刪除', () => { getTopIds([...selection]).forEach(id => { const it = db.find(x => x.id === id); if (it) { thumbCache.delete(id); if (it.type === 'dir') { const desc = collectAllDescendantIds(id, true); desc.forEach(did => thumbCache.delete(did)); db = db.filter(x => !desc.includes(x.id) && x.id !== id); } else db = db.filter(x => x.id !== id); } }); selection.clear(); syncSel(); render(); }, false, true));
      } else if (curTab === 'drive') {
        left.appendChild(btn('下載', downloadSel, true));
        if (selection.size === 1) left.appendChild(btn('重新命名', () => { editId = [...selection][0]; render(); }, true));
        left.appendChild(btn(selection.size===1?'移動':'批量移動', () => { clip={mode:'move',ids:[...selection]}; selection.clear(); syncSel(); render(); }, true));
        left.appendChild(btn(selection.size===1?'複製':'批量複製', () => { clip={mode:'copy',ids:[...selection]}; selection.clear(); syncSel(); render(); }, true));
        left.appendChild(btn(selection.size===1?'刪除':'批量刪除', () => { getTopIds([...selection]).forEach(id => { const it = db.find(x => x.id === id); if (it) { thumbCache.delete(id); if (it.type === 'dir') { const desc = collectAllDescendantIds(id, true); desc.forEach(did => thumbCache.delete(did)); markDeletedRecursive(id); } else it.del = true; } }); selection.clear(); syncSel(); render(); }, false, true));
      }
    } else if (clip.ids.length > 0 && curTab === 'drive') {
      left.appendChild(btn(`貼上 (${clip.ids.length})`, () => { handlePaste(); render(); }, true));
      left.appendChild(btn('取消', () => { clip = {mode:null,ids:[]}; render(); }));
    } else if (curTab === 'drive' && !filterCat && selection.size === 0 && clip.ids.length === 0) {
      if (refresh) refresh.style.display = 'flex';
    }
  }

  function btn(text, action, primary=false, danger=false) { const b = document.createElement('button'); b.className = 't-btn' + (primary?' primary':'') + (danger?' danger':''); b.textContent = text; b.onclick = action; return b; }

  function handlePaste() {
    if (curTab !== 'drive' || filterCat) { showToast('無法在此視圖貼上'); return; }
    const targetPid = pathStack[pathStack.length-1].id;
    const valid = clip.ids.filter(id => { const it = db.find(x => x.id === id); return it && !it.del; });
    if (!valid.length) { showToast('剪貼簿中的項目已不存在'); clip = {mode:null,ids:[]}; render(); return; }
    const rootIds = getTopIds(valid);
    if (clip.mode === 'move') {
      for (let id of rootIds) { const item = db.find(x => x.id === id); if (item && item.type === 'dir' && isDescendant(id, targetPid)) { showToast('無法移動：目標為來源的子資料夾'); return; } }
      for (let id of rootIds) { const item = db.find(x => x.id === id); if (item.type === 'dir') moveFolderRecursive(id, targetPid); else relocateItem(item, targetPid); }
      showToast(`已移動 ${rootIds.length} 個項目`);
    } else {
      let cnt = 0; rootIds.forEach(id => { if (deepCopy(id, targetPid)) cnt++; }); showToast(`已複製 ${cnt} 個項目`);
    }
    clip = {mode:null,ids:[]}; selection.clear(); syncSel(); searchInput.value = ''; searchQuery = ''; render();
  }

  function collectAllDescendantIds(fid, incDel=false) { let ids=[], stack=[fid]; while(stack.length){ const pid=stack.pop(); const children=db.filter(x=>x.pid===pid&&(incDel||!x.del)); for(let c of children){ ids.push(c.id); if(c.type==='dir') stack.push(c.id); } } return ids; }

  function downloadSel() { if (!selection.size) return; const topIds = getTopIds([...selection]); const items = topIds.map(id => db.find(x => x.id === id)).filter(it => it && !it.del); if (!items.length) return; if (items.length === 1 && items[0].type === 'file') { downloadItem(items[0]); return; } showToast('已準備下載'); }

  const searchInput = document.getElementById('search-inp');
  searchInput.addEventListener('input', () => { searchQuery = searchInput.value.trim(); if (curTab !== 'home') render(); });

  const uploadBtn = document.getElementById('btn-upload');
  const newFolderBtn = document.getElementById('btn-newfolder');
  const fileInput = document.getElementById('file-up');
  uploadBtn.addEventListener('click', () => { if (uploadBtn.classList.contains('disabled')) return; commitEdit(); fileInput.click(); });
  newFolderBtn.addEventListener('click', () => { if (newFolderBtn.classList.contains('disabled') || filterCat) return; commitEdit(); App.createFolder(); });
  fileInput.addEventListener('change', function() {
    if (curTab !== 'drive' || filterCat) { showToast('請在「我的硬碟」上傳'); fileInput.value = ''; return; }
    if (isUploading) return;
    const files = fileInput.files; if (!files.length) return;
    const targetPid = pathStack[pathStack.length-1].id; isUploading = true; updateSidebarButtons(); showToast(`正在上傳 ${files.length} 個文件...`);
    const proms = []; for (let file of files) proms.push(new Promise(res => { const r = new FileReader(); r.onload = e => res({name:file.name,size:file.size,content:new Uint8Array(e.target.result)}); r.onerror = () => res(null); r.readAsArrayBuffer(file); }));
    Promise.all(proms).then(results => {
      let cnt = 0; for (let res of results) { if (!res) continue; const nn = getUniqueName(res.name, targetPid, 'file'); if (nn !== res.name) showToast(`檔案「${res.name}」已更名為「${nn}」`); db.push({id:generateId(),name:nn,type:'file',pid:targetPid,del:false,time:Date.now(),size:res.size,content:res.content}); cnt++; }
      searchInput.value = ''; searchQuery = ''; render(); showToast(`已上傳 ${cnt} 個文件`); fileInput.value = ''; isUploading = false; updateSidebarButtons();
    }).catch(err => { showErrorModal('上傳失敗: ' + err); fileInput.value = ''; isUploading = false; updateSidebarButtons(); });
  });

  function updateSidebarButtons() {
    document.getElementById('btn-upload').classList.toggle('disabled', isUploading || curTab !== 'drive' || !!filterCat);
    document.getElementById('btn-newfolder').classList.toggle('disabled', curTab !== 'drive' || !!filterCat);
  }

  window.App = {
    toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); },
    switchTab(tab) {
      if (isUploading) { showToast('上傳中，請稍後再切換'); return; }
      commitEdit(); curTab = tab; clip = {mode:null,ids:[]}; if (tab !== 'drive') filterCat = null;
      pathStack = [{id:'0', name: tab==='home'?'首頁':tab==='drive'?'我的硬碟':tab==='recent'?'最近項目':'垃圾桶'}];
      selection.clear(); syncSel(); searchInput.value = ''; searchQuery = ''; editId = null; lastClickId = null; clearPressState();
      document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.id === `menu-${tab}`));
      updateSidebarButtons(); document.getElementById('view-toggle').style.display = (tab === 'drive' && !filterCat) ? 'flex' : 'none';
      render();
    },
    goPath(idx) { if (curTab !== 'drive' || isUploading || filterCat) return; commitEdit(); pathStack = pathStack.slice(0, idx+1); selection.clear(); syncSel(); editId = null; searchInput.value = ''; searchQuery = ''; lastClickId = null; clearPressState(); render(); },
    createFolder() { if (curTab !== 'drive' || filterCat) return; const targetPid = pathStack[pathStack.length-1].id; const nn = getUniqueName('未命名資料夾',targetPid,'dir'); db.push({id:generateId(),name:nn,type:'dir',pid:targetPid,del:false,time:Date.now(),size:0}); editId = db[db.length-1].id; render(); },
    setView(mode) { if (filterCat) return; viewMode = mode; document.getElementById('view-list').classList.toggle('active', mode==='list'); document.getElementById('view-card').classList.toggle('active', mode==='card'); render(); },
    refresh() { const vp = document.getElementById('main-view'); vp.classList.add('slide-up'); setTimeout(() => { render(); vp.classList.remove('slide-up'); }, 250); }
  };

  function commitEdit() {
    if (!editId) return;
    const inp = document.getElementById('inp-edit');
    const target = db.find(x => x.id === editId);
    if (target && inp) {
      let nn = inp.value.trim();
      if (nn && nn !== target.name) {
        const un = getUniqueName(nn, target.pid, target.type, target.id);
        if (un !== nn) showToast(`重新命名時自動更名為「${un}」`);

        target.time = Date.now();

  function makeSvgCalendar() { return `<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--accent)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`; }
  function adaptiveFontSize(name) { const len = name.length; if (len <= 6) return '14px'; if (len <= 12) return '13px'; if (len <= 20) return '12px'; return '11px'; }

  function render() {
    if (curTab === 'home') { renderHome(); updateToolbar(); return; }
    lastClickId = null;
    const bc = document.getElementById('breadcrumb');
    if (filterCat) {
      const catNames = {image:'圖片', video:'視頻', audio:'音頻', document:'文件'};
      bc.innerHTML = `<span onclick="App.switchTab('home')" style="cursor:pointer">← 返回首頁</span> / <span style="font-weight:500;color:var(--text)">${catNames[filterCat]}</span>`;
      const exts = filterCat === 'image' ? IMG : filterCat === 'video' ? VID : filterCat === 'audio' ? AUD : new Set(['pdf','doc','docx','txt','md','csv','xls','xlsx','ppt','pptx']);
      let items = db.filter(x => x.type === 'file' && !x.del && exts.has(x.name.split('.').pop().toLowerCase()));

    const v = document.getElementById('main-view'); v.innerHTML = '';

      items.forEach(item => { const card = document.createElement('div'); card.className = 'card-item'; card.setAttribute('data-id', item.id); card.innerHTML = `<div class="card-preview">${getFileIconLarge(item.name)}</div><div class="card-name" style="font-size:${adaptiveFontSize(item.name)}">${escapeHtml(item.name)}</div>`; grid.appendChild(card); });

          card.innerHTML = previewHtml + nameBlock; grid.appendChild(card);

      if (items.length === 0) v.appendChild(elem('div','empty-state', searchQuery?'找不到匹配項目':'此處空空如也'));
    } else if (curTab === 'trash') {

  }

  function elem(tag, cls, text) { const el = document.createElement(tag); el.className = cls; if (text) el.textContent = text; return el; }

  function renderHome() {

    const recentItems = db.filter(x => !x.del).sort((a,b) => b.time - a.time).slice(0,5);
    let html = `<div class="home-container"><h2 style="font-size:24px;font-weight:600;margin-bottom:4px">${greet()}，${escapeHtml(userName)}</h2><p style="color:var(--sub);margin-bottom:20px">欢迎回来</p>

      <div class="category-grid">
        <div class="category-card" data-filter="image"><svg viewBox="0 0 64 64" fill="none" stroke="var(--accent)" stroke-width="2"><rect x="8" y="8" width="48" height="48" rx="4"/><circle cx="22" cy="22" r="6"/><path d="M8 44l12-12 8 8 12-12 12 12"/></svg><div class="cat-label">图片</div><div class="tag" style="margin-top:4px">${imgCount} 个</div></div>
        <div class="category-card" data-filter="video"><svg viewBox="0 0 64 64" fill="none" stroke="#ea4335" stroke-width="2"><rect x="8" y="12" width="48" height="40" rx="4"/><polygon points="26,22 26,42 42,32"/></svg><div class="cat-label">视频</div><div class="tag" style="margin-top:4px">${vidCount} 个</div></div>
        <div class="category-card" data-filter="audio"><svg viewBox="0 0 64 64" fill="none" stroke="#fbbc04" stroke-width="2"><circle cx="32" cy="32" r="18"/><polygon points="26,22 26,42 42,32"/></svg><div class="cat-label">音频</div><div class="tag" style="margin-top:4px">${audCount} 个</div></div>
        <div class="category-card" data-filter="document"><svg viewBox="0 0 64 64" fill="none" stroke="#34a853" stroke-width="2"><path d="M20 8h18l10 10v36a2 2 0 0 1-2 2H20a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2z"/><polyline points="20 8 20 8 38 8 48 18 48 56"/><line x1="28" y1="28" x2="40" y2="28"/></svg><div class="cat-label">文档</div><div class="tag" style="margin-top:4px">${docCount} 个</div></div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px">
        <div class="home-card"><h3 style="font-size:16px;font-weight:600">最近看过</h3>${recentFiles.map(f => `<div class="recent-item">${getFileIconSmall(f.name)}<span style="max-width:160px;overflow:hidden;text-overflow:ellipsis">${escapeHtml(f.name)}</span><span class="tag" style="margin-left:auto">${formatSize(f.size)}</span></div>`).join('')||'<div class="empty-state">暫無最近文件</div>'}</div>
        <div class="home-card"><h3 style="font-size:16px;font-weight:600">最近保存</h3>${recentItems.map(item => `<div class="recent-item">${item.type==='dir'?getFolderIconSmall():getFileIconSmall(item.name)}<span style="max-width:160px;overflow:hidden;text-overflow:ellipsis">${escapeHtml(item.name)}</span></div>`).join('')||'<div class="empty-state">暫無記錄</div>'}</div>
      </div></div>`;
    v.innerHTML = html;
    document.getElementById('doSignBtn')?.addEventListener('click', () => { if (signedToday) return; const todayKey = new Date().toDateString(); localStorage.setItem('cloud_sign_date', todayKey); signDate = todayKey; signPoints += 10; localStorage.setItem('cloud_sign_points', signPoints.toString()); showToast('签到成功，积分 +10'); renderHome(); });
    document.querySelectorAll('.category-card').forEach(card => { card.addEventListener('click', () => { const filter = card.getAttribute('data-filter'); if (filter) { filterCat = filter; curTab = 'drive'; pathStack = [{id:'0', name: filter==='image'?'圖片':filter==='video'?'視頻':filter==='audio'?'音頻':'文件'}]; selection.clear(); searchQuery = ''; searchInput.value = ''; editId = null; clearPressState(); document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.id === 'menu-drive')); document.getElementById('view-toggle').style.display = 'none'; if (viewMode !== 'card') { viewMode = 'card'; document.getElementById('view-list').classList.remove('active'); document.getElementById('view-card').classList.add('active'); } updateSidebarButtons(); render(); } }); });
    document.querySelectorAll('.recent-item').forEach(el => { el.addEventListener('click', () => { const name = el.querySelector('span').textContent.trim(); const item = db.find(x => x.name === name && !x.del); if (!item) return; if (item.type === 'file') { App.switchTab('drive'); setTimeout(() => showPreview(item), 100); } else { App.switchTab('drive'); setTimeout(() => { pathStack = [{id:'0', name:'我的硬碟'}]; pathStack.push({id:item.id, name:item.name}); render(); }, 100); } }); });
  }

  // 拖拽逻辑
  function clearPressState() { if(pressTimer) clearTimeout(pressTimer); pressTimer = null; pressTargetId = null; longPressActive = false; }
  function handlePressStart(e) {
    const card = e.target.closest('.card-item');
    if (!card || curTab !== 'drive' || viewMode !== 'card') return;
    if (e.target.closest('.card-name, .inline-input')) return;
    const id = card.getAttribute('data-id'); if (!id) return;
    const item = db.find(x => x.id === id); if (!item || (item.type !== 'file' && item.type !== 'dir')) return;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    pressSX = cx; pressSY = cy; pressTargetId = id; longPressActive = false;
    clearTimeout(pressTimer);
    pressTimer = setTimeout(() => { if (pressTargetId === id) longPressActive = true; pressTimer = null; }, LONG_PRESS);
  }
  function handlePressMove(e) {
    if (!pressTargetId) return;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    if (Math.abs(cx - pressSX) > DRAG_TH || Math.abs(cy - pressSY) > DRAG_TH) clearPressState();
  }
  function handlePressEnd(e) { clearPressState(); }

  document.addEventListener('mousedown', handlePressStart);
  document.addEventListener('mousemove', handlePressMove);
  document.addEventListener('mouseup', handlePressEnd);
  if (isTouch) {
    document.addEventListener('touchstart', handlePressStart, {passive: false});
    document.addEventListener('touchmove', handlePressMove, {passive: false});
    document.addEventListener('touchend', handlePressEnd);
  }

  document.addEventListener('dragstart', function(e) {
    const card = e.target.closest('.card-item');
    if (!card) return;
    if (!longPressActive || pressTargetId !== card.getAttribute('data-id')) { e.preventDefault(); return false; }
    startDrag(e);
  });
  function startDrag(e) {
    const card = e.target.closest('.card-item');
    if (!card || curTab !== 'drive' || viewMode !== 'card') return;
    const id = card.getAttribute('data-id');
    const item = db.find(x => x.id === id);
    if (!item || (item.type !== 'file' && item.type !== 'dir')) return;
    draggingId = id; draggingType = item.type;
    card.style.transition = 'transform 0.3s, opacity 0.3s'; card.style.transform = 'scale(0.95)'; card.style.opacity = '0.7'; card.classList.add('locked');
    e.dataTransfer.setData('text/plain', id); e.dataTransfer.effectAllowed = 'move';
  }
  function endDrag(e) {
    if (dropInProgress) return;
    const hadDrag = draggingId !== null;
    const card = document.querySelector(`.card-item[data-id="${draggingId}"]`);
    if (card) { card.style.transition = ''; card.style.transform = ''; card.style.opacity = ''; card.classList.remove('locked'); }
    document.querySelectorAll('.drag-active').forEach(f => f.classList.remove('drag-active'));
    draggingId = null; draggingType = null; clearPressState();
    if (hadDrag) render();
  }
  document.addEventListener('dragend', endDrag);
  document.addEventListener('dragover', e => { e.preventDefault(); const fc = e.target.closest('.folder-item'); if (fc && !fc.classList.contains('drag-active')) { fc.classList.add('drag-active'); e.dataTransfer.dropEffect = 'move'; } });
  document.addEventListener('dragleave', e => { const fc = e.target.closest('.folder-item'); if (fc && !fc.contains(e.relatedTarget)) fc.classList.remove('drag-active'); });
  document.addEventListener('drop', function(e) {
    e.preventDefault();
    const fc = e.target.closest('.folder-item'); if (!fc || !draggingId) return;
    const folderId = fc.getAttribute('data-id'); if (!folderId || folderId === draggingId) return;
    const src = db.find(x => x.id === draggingId); if (!src) return;
    if (src.pid === folderId) { showToast('項目已在該資料夾中'); return; }
    if (src.type === 'dir' && isDescendant(draggingId, folderId)) { showErrorModal('無法移動：目標為來源的子資料夾'); return; }
    fc.classList.remove('drag-active');
    const sourceCard = document.querySelector(`.card-item[data-id="${draggingId}"]`); if (!sourceCard) return;
    dropInProgress = true; sourceCard.style.transition = '';
    const sr = sourceCard.getBoundingClientRect(); const tr = fc.getBoundingClientRect();
    sourceCard.classList.add('inhale');
    sourceCard.style.transform = `translate(${tr.left+tr.width/2-sr.left-sr.width/2}px, ${tr.top+tr.height/2-sr.top-sr.height/2}px) scale(0.08)`;
    sourceCard.style.opacity = '0';
    setTimeout(() => { fc.classList.add('jelly-anim'); setTimeout(() => fc.classList.remove('jelly-anim'), 500); }, 200);
    const reset = () => {
      sourceCard.removeEventListener('transitionend', reset);
      sourceCard.classList.remove('inhale','locked'); sourceCard.style.transform = ''; sourceCard.style.opacity = ''; dropInProgress = false;
      try {
        if (draggingType === 'file') { relocateItem(src, folderId); showToast(`已將 ${src.name} 移入資料夾`); }
        else { moveFolderRecursive(draggingId, folderId); showToast(`已將資料夾「${src.name}」移入`); }
      } catch (err) { showErrorModal('移動失敗: ' + err.message); }
      draggingId = null; draggingType = null; clearPressState(); render();
    };
    sourceCard.addEventListener('transitionend', function handler(e) { if (e.propertyName === 'transform' || e.propertyName === 'opacity') { sourceCard.removeEventListener('transitionend', handler); reset(); } });
    setTimeout(() => { if (dropInProgress && sourceCard.style.transform.includes('scale')) reset(); }, 900);
  });

  document.addEventListener('selectstart', e => { let t = e.target; if (t && !t.closest) t = t.parentElement; if (!t || !t.closest) return; if (!t.closest('input, textarea')) e.preventDefault(); });
  document.addEventListener('contextmenu', e => e.preventDefault());
  window.addEventListener('dragover', e => e.preventDefault());
  window.addEventListener('drop', e => e.preventDefault());

  render();
  updateSidebarButtons();
})();
</script>
</body>
</html>
