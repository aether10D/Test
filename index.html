<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>AETHER 10D ARCHITECT</title>
    <link rel="icon" href="IMG_1978.jpeg" type="image/jpeg">
    <style>
        :root {
            --bg: #ffffff;
            --accent: #1a73e8;
            --accent-soft: #f1f3f4;
            --border: #f1f3f4;
            --text-main: #202124;
            --text-sub: #5f6368;
            --danger: #d93025;
            --shadow: 0 1px 3px rgba(60,64,67,0.1);
            --sidebar-width: 260px;
            --sidebar-collapsed: 72px;
        }

        * { box-sizing: border-box; outline: none; }
        body { margin: 0; font-family: "Segoe UI", system-ui, sans-serif; display: flex; height: 100vh; background: var(--bg); color: var(--text-main); overflow: hidden; }

        /* Sidebar Navigation */
        #sidebar { 
            width: var(--sidebar-width); 
            background: var(--bg); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 16px; 
            flex-shrink: 0; 
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        #sidebar.collapsed { width: var(--sidebar-collapsed); }
        #sidebar.collapsed .brand-name, 
        #sidebar.collapsed .nav-text, 
        #sidebar.collapsed .btn-text { display: none; }
        #sidebar.collapsed .nav-item { justify-content: center; padding: 0; }
        #sidebar.collapsed .btn-main-pill { padding: 0; width: 40px; height: 40px; border-radius: 50%; justify-content: center; margin: 0 auto 12px; }

        .brand { padding: 8px 4px 32px; display: flex; align-items: center; cursor: pointer; }
        .logo-img { width: 36px; height: 36px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }

        .action-area { padding-bottom: 24px; display: flex; flex-direction: column; gap: 12px; }
        .btn-main-pill { height: 48px; border-radius: 24px; border: 1px solid var(--border); background: #fff; box-shadow: var(--shadow); display: flex; align-items: center; padding: 0 24px; cursor: pointer; transition: 0.2s; font-size: 14px; font-weight: 500; gap: 12px; width: fit-content; white-space: nowrap; }
        .btn-main-pill:hover { background: #fafafa; }

        .nav-group { display: flex; flex-direction: column; gap: 4px; }
        .nav-item { height: 40px; display: flex; align-items: center; padding: 0 20px; cursor: pointer; border-radius: 20px; font-size: 14px; transition: 0.2s; color: var(--text-main); white-space: nowrap; }
        .nav-item:hover { background: var(--accent-soft); }
        .nav-item.active { background: var(--accent-soft) !important; color: var(--accent) !important; font-weight: 600; }
        .nav-icon { margin-right: 12px; flex-shrink: 0; }
        #sidebar.collapsed .nav-icon { margin-right: 0; }

        /* Workspace */
        main { flex: 1; display: flex; flex-direction: column; transition: margin 0.3s; }
        header { height: 64px; display: flex; align-items: center; padding: 0 24px; }
        .search-capsule { background: #f1f3f4; border-radius: 22px; height: 44px; width: 100%; max-width: 600px; display: flex; align-items: center; padding: 0 16px; transition: 0.2s; border: 1px solid transparent; }
        .search-capsule:focus-within { background: #fff; border-color: var(--accent); box-shadow: var(--shadow); }
        .search-capsule input { background: transparent; border: none; flex: 1; font-size: 15px; margin-left: 12px; }

        .toolbar { height: 56px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
        .path-text { font-size: 16px; color: var(--text-sub); }
        .tool-group { display: flex; gap: 8px; }

        .btn-capsule { height: 32px; padding: 0 16px; border-radius: 16px; border: 1px solid var(--border); background: #fff; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text-sub); transition: 0.2s; }
        .btn-capsule:hover { border-color: var(--accent); color: var(--accent); }
        .btn-capsule.danger { color: var(--danger); }
        .btn-capsule.danger:hover { border-color: var(--danger); background: #fff5f5; }

        .viewport { flex: 1; overflow-y: auto; padding: 0 24px 24px; }

        /* List/Grid UI */
        .list-table { width: 100%; border-collapse: collapse; }
        .list-table th { text-align: left; padding: 12px; font-size: 12px; color: var(--text-sub); border-bottom: 1px solid var(--border); font-weight: 500; }
        .list-row { border-bottom: 1px solid #fafafa; cursor: pointer; }
        .list-row:hover { background: #f8f9fa; }
        .list-row.selected { background: var(--accent-soft); }
        .list-row td { padding: 12px; font-size: 14px; }
        .item-box { display: flex; align-items: center; gap: 12px; }

        .svg-icon { width: 20px; height: 20px; flex-shrink: 0; fill: currentColor; }
        .folder-color { fill: #fbbc04; }
        .file-color { fill: var(--text-sub); }

        #toast { position: fixed; bottom: 24px; left: 24px; background: #323232; color: #fff; padding: 12px 24px; border-radius: 24px; font-size: 14px; display: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="toast"></div>

<aside id="sidebar">
    <div class="brand" onclick="toggleSidebar()">
        <img src="IMG_1978.jpeg" class="logo-img">
    </div>
    <div class="action-area">
        <button class="btn-main-pill" onclick="document.getElementById('fup').click()">
            <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            <span class="btn-text">上傳文件</span>
        </button>
        <button class="btn-main-pill" onclick="createFolder()">
            <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
            <span class="btn-text">建立資料夾</span>
        </button>
    </div>
    <nav class="nav-group">
        <div class="nav-item active" id="nav-drive" onclick="switchTab('drive')">
            <svg class="svg-icon nav-icon" viewBox="0 0 24 24"><path d="M19 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 18H5V4h14v16z"/></svg>
            <span class="nav-text">我的硬碟</span>
        </div>
        <div class="nav-item" id="nav-recent" onclick="switchTab('recent')">
            <svg class="svg-icon nav-icon" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            <span class="nav-text">最近項目</span>
        </div>
        <div class="nav-item" id="nav-trash" onclick="switchTab('trash')">
            <svg class="svg-icon nav-icon" viewBox="0 0 24 24"><path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z"/></svg>
            <span class="nav-text">垃圾桶</span>
        </div>
    </nav>
</aside>

<main>
    <header>
        <div class="search-capsule">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" placeholder="搜尋文件" id="sinp">
        </div>
    </header>
    <div class="toolbar">
        <div class="path-text" id="path-box">我的硬碟</div>
        <div class="tool-group" id="t-box"></div>
    </div>
    <div class="viewport" id="view"></div>
</main>

<input type="file" id="fup" style="display:none" multiple onchange="handleUpload(this)">

<script>
    let db = [];
    let currentTab = 'drive', pathStack = [{id:'0', name:"我的硬碟"}], selection = new Set();
    let clip = { mode: null, ids: [] }, searchQuery = "";

    const SVG_DIR = `<svg class="svg-icon folder-color" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>`;
    const SVG_FILE = `<svg class="svg-icon file-color" viewBox="0 0 24 24"><path d="M13 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V9l-7-7z"/><path d="M13 2v7h7"/></svg>`;

    // 初始化模擬數據
    for(let i=0; i<10; i++) {
        db.push({ id: crypto.randomUUID(), name: `項目_${i}`, type: i<3?'dir':'file', pid: '0', del: false, time: Date.now() - i*3600000 });
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    }

    function getSafeName(name, pid, type) {
        let n = name, idx = 1;
        const parse = n.match(/^(.*?)(?:\((\d+)\))?(\.[^.]+)?$/);
        let base = parse[1], ext = parse[3] || "";
        while(db.some(x => x.pid === pid && x.name === n && x.type === type && !x.del)) {
            n = `${base}(${idx++})${ext}`;
        }
        return n;
    }

    function render() {
        const view = document.getElementById('view');
        const cur = pathStack[pathStack.length-1];
        view.innerHTML = "";

        let items = db.filter(x => x.del === (currentTab === 'trash'));
        if(currentTab === 'drive') {
            items = items.filter(x => x.pid === cur.id);
        }
        if(searchQuery) items = items.filter(x => x.name.toLowerCase().includes(searchQuery.toLowerCase()));

        const table = document.createElement('table');
        table.className = 'list-table';
        table.innerHTML = `<tr><th>名稱</th><th>日期</th><th>大小</th></tr>`;
        
        let displayItems = currentTab === 'recent' ? items.sort((a,b)=>b.time-a.time).slice(0,15) : items;

        displayItems.forEach(it => {
            const tr = document.createElement('tr');
            tr.className = `list-row ${selection.has(it.id)?'selected':''}`;
            tr.onclick = (e) => select(e, it.id);
            tr.ondblclick = () => openItem(it);
            tr.innerHTML = `<td><div class="item-box">${it.type==='dir'?SVG_DIR:SVG_FILE}<span>${it.name}</span></div></td>
                            <td style="color:var(--text-sub)">${new Date(it.time).toLocaleDateString()}</td>
                            <td style="color:var(--text-sub)">${it.type==='dir'?'-':'<1KB'}</td>`;
            table.appendChild(tr);
        });
        view.appendChild(table);
        updateToolbar();
    }

    function openItem(it) {
        if(currentTab === 'trash') return; // 垃圾桶內禁止進入
        if(it.type === 'dir') {
            pathStack.push({id: it.id, name: it.name});
            selection.clear(); render();
        }
    }

    function select(e, id) {
        if(e.ctrlKey || e.metaKey) { selection.has(id) ? selection.delete(id) : selection.add(id); }
        else { selection.clear(); selection.add(id); }
        render();
    }

    function updateToolbar() {
        document.getElementById('path-box').innerText = currentTab==='recent'?"最近項目":pathStack.map(x=>x.name).join(' / ');
        const tbox = document.getElementById('t-box');
        tbox.innerHTML = "";

        if(selection.size > 0) {
            if(currentTab !== 'trash') {
                tbox.append(createBtn("剪下", () => { clip={mode:'move', ids:[...selection]}; selection.clear(); render(); }));
                tbox.append(createBtn("複製", () => { clip={mode:'copy', ids:[...selection]}; selection.clear(); render(); }));
                tbox.append(createBtn("刪除", () => { selection.forEach(id => {const it=db.find(x=>x.id===id); if(it) it.del=true;}); selection.clear(); render(); }, true));
            } else {
                tbox.append(createBtn("復原", () => {
                    selection.forEach(id => {
                        const it = db.find(x=>x.id===id);
                        if(it) { it.del = false; cascadeRestore(it.id); }
                    });
                    selection.clear(); render();
                }));
                tbox.append(createBtn("永久刪除", () => {
                    if(confirm("永久刪除不可恢復，確定？")) {
                        selection.forEach(id => purge(id));
                        selection.clear(); render();
                    }
                }, true));
            }
        } else if(clip.ids.length > 0 && currentTab === 'drive') {
            tbox.append(createBtn("在此貼上", handlePaste));
            tbox.append(createBtn("取消", () => { clip.ids=[]; render(); }));
        }
    }

    function createBtn(txt, act, dan=false) {
        const b = document.createElement('button');
        b.className = `btn-capsule ${dan?'danger':''}`;
        b.innerText = txt; b.onclick = (e) => { e.stopPropagation(); act(); }; return b;
    }

    function handlePaste() {
        const targetPid = pathStack[pathStack.length-1].id;
        clip.ids.forEach(id => {
            const ori = db.find(x => x.id === id);
            if(!ori) return;
            if(clip.mode === 'move') {
                if(isDescendant(id, targetPid)) { showToast("無法將資料夾移入自身子目錄"); return; }
                ori.pid = targetPid;
                ori.name = getSafeName(ori.name, targetPid, ori.type);
            } else {
                deepCopy(id, targetPid);
            }
        });
        clip.ids = []; render();
    }

    function deepCopy(id, newPid) {
        const ori = db.find(x => x.id === id);
        if(!ori) return;
        const newId = crypto.randomUUID();
        const newName = getSafeName(ori.name, newPid, ori.type);
        db.push({ ...ori, id: newId, pid: newPid, name: newName, time: Date.now() });
        if(ori.type === 'dir') {
            db.filter(x => x.pid === id && !x.del).forEach(child => deepCopy(child.id, newId));
        }
    }

    function isDescendant(pid, tid) {
        if(pid === tid) return true;
        return db.filter(x => x.pid === pid && x.type === 'dir').some(c => isDescendant(c.id, tid));
    }

    function purge(id) {
        const it = db.find(x => x.id === id);
        if(!it) return;
        if(it.type === 'dir') db.filter(x => x.pid === id).forEach(c => purge(c.id));
        db = db.filter(x => x.id !== id);
    }

    function cascadeRestore(pid) {
        db.filter(x => x.pid === pid).forEach(c => { c.del = false; cascadeRestore(c.id); });
    }

    function handleUpload(inp) {
        const pid = pathStack[pathStack.length-1].id;
        Array.from(inp.files).forEach(f => {
            db.push({ id: crypto.randomUUID(), name: getSafeName(f.name, pid, 'file'), type: 'file', pid: pid, del: false, time: Date.now() });
        });
        inp.value = ""; render();
    }

    function createFolder() {
        const pid = pathStack[pathStack.length-1].id;
        const name = getSafeName("新資料夾", pid, 'dir');
        db.push({ id: crypto.randomUUID(), name, type: 'dir', pid, del: false, time: Date.now() });
        render();
    }

    function switchTab(t) {
        currentTab = t; selection.clear();
        pathStack = [{id:'0', name: "我的硬碟"}];
        document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.id === `nav-${t}`));
        render();
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    document.getElementById('sinp').oninput = (e) => { searchQuery = e.target.value; render(); };
    window.onload = render;
</script>
</body>
</html>
