<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <title>Aether 10D - Quantum Portal</title>
    <link rel="icon" href="IMG_1978.jpeg" type="image/jpeg">
    <style>
        :root {
            --accent: #1a73e8; --bg-side: #f8f9fa; --border: #dadce0;
            --text-main: #202124; --text-sub: #5f6368;
            --radius-pill: 28px; --shadow-fab: 0 4px 12px rgba(0,0,0,0.15);
        }

        body { margin: 0; font-family: 'Inter', system-ui; display: flex; height: 100vh; background: #fff; overflow: hidden; }

        /* --- Sidebar --- */
        #sidebar { width: 260px; background: var(--bg-side); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex-shrink: 0; }
        #sidebar.collapsed { width: 88px; }
        
        .logo-box { height: 72px; display: flex; align-items: center; padding-left: 28px; cursor: pointer; }
        .logo-img { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; }
        .logo-txt { font-weight: 700; font-size: 18px; margin-left: 12px; }
        #sidebar.collapsed .logo-txt { display: none; }

        .action-zone { padding: 8px 16px 20px; display: flex; flex-direction: column; gap: 12px; }
        .btn-main { 
            height: 56px; border: none; background: #fff; border-radius: 16px; 
            box-shadow: 0 1px 3px rgba(60,64,67,0.3);
            cursor: pointer; display: flex; align-items: center; padding: 0 20px; 
            font-size: 15px; font-weight: 600; gap: 14px; transition: 0.2s;
        }
        .btn-main:hover:not(:disabled) { background: #f1f3f4; box-shadow: var(--shadow-fab); }
        .btn-main:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        .btn-main svg { width: 24px; height: 24px; flex-shrink: 0; }
        
        #sidebar.collapsed .btn-main { width: 56px; padding: 0; justify-content: center; border-radius: 50%; }
        #sidebar.collapsed .btn-txt { display: none; }

        .nav-link { height: 48px; display: flex; align-items: center; margin: 4px 12px; padding: 0 20px; border-radius: 24px; cursor: pointer; color: var(--text-sub); gap: 16px; }
        .nav-link.active { background: #e8f0fe; color: var(--accent); font-weight: 700; }
        .nav-link svg { width: 20px; height: 20px; }
        #sidebar.collapsed .nav-txt { display: none; }

        /* --- Main Logic UI --- */
        main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        header { height: 68px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; }
        
        .breadcrumbs { display: flex; align-items: center; font-size: 18px; }
        .crumb { cursor: pointer; color: var(--text-sub); padding: 4px 10px; border-radius: 6px; transition: 0.2s; }
        .crumb:hover:not(.active) { background: #f1f3f4; color: var(--accent); text-decoration: underline; }
        .crumb.active { color: var(--text-main); font-weight: 700; cursor: default; }

        .toolbar { display: flex; gap: 8px; }
        .t-btn { 
            height: 36px; border: 1px solid var(--border); background: #fff; 
            border-radius: 18px; cursor: pointer; display: flex; align-items: center; 
            padding: 0 14px; font-size: 13px; font-weight: 600; gap: 6px;
        }
        .t-btn:hover { background: #f8f9fa; border-color: var(--accent); }
        .t-btn.danger { color: #d93025; }
        .t-btn.cancel { background: #eee; border: none; }

        .viewport { flex: 1; overflow-y: auto; padding: 20px; }
        .list-row { display: grid; grid-template-columns: 2fr 1fr 100px; padding: 0 20px; height: 56px; align-items: center; border-radius: 10px; cursor: pointer; border-bottom: 1px solid #f1f3f4; }
        .list-row:hover { background: #f8f9fa; }
        .list-row.selected { background: #e8f0fe; }

        /* 帶有取消按鈕的編輯框 */
        .edit-container { display: flex; align-items: center; gap: 8px; width: 100%; }
        .edit-box { flex: 1; display: flex; align-items: center; gap: 12px; padding: 10px 16px; border: 2px solid var(--accent); border-radius: 10px; background: #fff; }
        .edit-input { border: none; outline: none; width: 100%; font: inherit; }
        .edit-cancel { padding: 8px 12px; cursor: pointer; font-size: 12px; color: var(--text-sub); border-radius: 6px; }
        .edit-cancel:hover { background: #fee; color: #d93025; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="logo-box" onclick="toggleSidebar()">
        <img src="IMG_1978.jpeg" class="logo-img">
        <span class="logo-txt">Aether 10D</span>
    </div>
    <div class="action-zone">
        <button class="btn-main" id="btn-up" onclick="document.getElementById('f-in').click()">
            <svg viewBox="0 0 24 24"><path fill="#EA4335" d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm-1 7V4.5l5.5 5.5H13z"/></svg>
            <span class="btn-txt">上傳文件</span>
        </button>
        <button class="btn-main" id="btn-new" onclick="startCreate()">
            <svg viewBox="0 0 24 24"><path fill="#FBBC04" d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>
            <span class="btn-txt">建立資料夾</span>
        </button>
        <input type="file" id="f-in" style="display:none" onchange="handleUp(this)">
    </div>
    <nav>
        <div class="nav-link active" id="n-drive" onclick="switchTab('drive')">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            <span class="nav-txt">我的硬碟</span>
        </div>
        <div class="nav-link" id="n-recent" onclick="switchTab('recent')">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9z"/></svg>
            <span class="nav-txt">最近項目</span>
        </div>
        <div class="nav-link" id="n-trash" onclick="switchTab('trash')">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            <span class="nav-txt">垃圾桶</span>
        </div>
    </nav>
</aside>

<main>
    <header>
        <div id="bc-ui" class="breadcrumbs"></div>
        <div id="toolbar" class="toolbar"></div>
    </header>
    <div id="v-port" class="viewport"></div>
</main>

<script>
    let db = [
        {id:1, name:'10D_Core.bin', isDir:false, parent:'我的硬碟', del:false, time:Date.now()},
        {id:2, name:'資料庫', isDir:true, parent:'我的硬碟', del:false, time:Date.now()}
    ];
    let currentMode = 'drive', drivePath = ["我的硬碟"];
    let sel = new Set(), creating = false, renamingId = null;
    let clip = { type: null, ids: [] };

    const ICON_DIR = `<svg width="24" height="24" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z" fill="#FFC107"/></svg>`;
    const ICON_FILE = `<svg width="24" height="24" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z" fill="#1A73E8"/></svg>`;

    function render() {
        const vp = document.getElementById('v-port'), tb = document.getElementById('toolbar'), bc = document.getElementById('bc-ui');
        vp.innerHTML = ""; tb.innerHTML = ""; bc.innerHTML = "";

        // 1. 麵包屑傳送導航
        const pRef = (currentMode === 'drive') ? drivePath : [currentMode === 'recent' ? "最近項目" : "垃圾桶"];
        pRef.forEach((p, i) => {
            const span = document.createElement('span');
            span.className = `crumb ${i === pRef.length-1 ? 'active' : ''}`;
            span.innerText = p;
            // 點擊傳送邏輯
            span.onclick = () => { 
                if(currentMode === 'drive' && i < drivePath.length-1) { 
                    drivePath = drivePath.slice(0, i+1); 
                    sel.clear(); render(); 
                } 
            };
            bc.appendChild(span);
            if(i < pRef.length-1) bc.innerHTML += `<span style="color:#ccc;margin:0 4px">/</span>`;
        });

        // 按鈕狀態控制
        const canEdit = (currentMode === 'drive');
        document.getElementById('btn-up').disabled = document.getElementById('btn-new').disabled = !canEdit;

        const curDir = canEdit ? drivePath[drivePath.length-1] : null;
        let data = (currentMode === 'drive') ? db.filter(x => x.parent === curDir && !x.del) : (currentMode === 'recent' ? db.filter(x => !x.del && !x.isDir) : db.filter(x => x.del));

        // 新建資料夾 + 取消按鈕
        if(creating) {
            vp.appendChild(createEditBox("", true, 
                n => { db.unshift({id:Date.now(), name:n, isDir:true, parent:curDir, del:false, time:Date.now()}); creating=false; render(); },
                () => { creating=false; render(); }
            ));
        }

        data.forEach(i => {
            if(renamingId === i.id) {
                vp.appendChild(createEditBox(i.name, i.isDir, 
                    n => { i.name = n; renamingId = null; render(); },
                    () => { renamingId = null; render(); }
                ));
            } else {
                const r = document.createElement('div');
                r.className = `list-row ${sel.has(i.id)?'selected':''}`;
                r.onclick = (e) => { 
                    if(!e.ctrlKey && !e.metaKey) sel.clear();
                    sel.has(i.id) ? sel.delete(i.id) : sel.add(i.id);
                    render(); 
                };
                // 列表傳送邏輯
                r.ondblclick = () => { if(i.isDir && canEdit) { drivePath.push(i.name); sel.clear(); render(); } };
                r.innerHTML = `<div>${i.isDir?ICON_DIR:ICON_FILE} ${i.name}</div><div>剛剛</div><div>--</div>`;
                vp.appendChild(r);
            }
        });

        // 2. 現代化工具列與取消操作
        if(sel.size > 0 && canEdit) {
            const isMulti = sel.size > 1;
            if(!isMulti) tb.innerHTML += `<button class="t-btn" onclick="startRename()">重命名</button>`;
            tb.innerHTML += `<button class="t-btn" onclick="setClip('move')">${isMulti?'批量':''}移動</button>`;
            tb.innerHTML += `<button class="t-btn" onclick="setClip('copy')">${isMulti?'批量':''}複製</button>`;
            tb.innerHTML += `<button class="t-btn danger" onclick="delItems()">${isMulti?'批量':''}刪除</button>`;
        }
        if(clip.ids.length > 0 && canEdit) {
            tb.innerHTML += `<button class="t-btn success" onclick="pasteItems()">貼上 (${clip.ids.length})</button>`;
            tb.innerHTML += `<button class="t-btn cancel" onclick="cancelClip()">取消操作</button>`;
        }
    }

    function createEditBox(val, isDir, done, cancel) {
        const container = document.createElement('div'); container.className = 'edit-container';
        const box = document.createElement('div'); box.className = 'edit-box';
        box.innerHTML = `${isDir?ICON_DIR:ICON_FILE}<input class="edit-input" value="${val}" autofocus onfocus="this.select()">`;
        
        const cancelBtn = document.createElement('div');
        cancelBtn.className = 'edit-cancel';
        cancelBtn.innerText = '取消';
        cancelBtn.onclick = (e) => { e.stopPropagation(); cancel(); };

        container.appendChild(box);
        container.appendChild(cancelBtn);

        const input = box.querySelector('input');
        input.onkeydown = e => { 
            if(e.key==='Enter' && input.value) done(input.value); 
            if(e.key==='Escape') cancel(); 
        };
        return container;
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function switchTab(m) { if(m==='drive') drivePath=["我的硬碟"]; currentMode=m; sel.clear(); render(); document.querySelectorAll('.nav-link').forEach(l=>l.classList.toggle('active', l.id==='n-'+m)); }
    function startRename() { renamingId = Array.from(sel)[0]; render(); }
    function startCreate() { creating = true; render(); }
    function setClip(type) { clip = { type, ids: Array.from(sel) }; sel.clear(); render(); }
    function cancelClip() { clip = { type: null, ids: [] }; render(); }
    function delItems() { sel.forEach(id => db.find(x=>x.id===id).del = true); sel.clear(); render(); }
    function pasteItems() {
        const cur = drivePath[drivePath.length-1];
        clip.ids.forEach(id => {
            const item = db.find(x => x.id === id);
            if(clip.type === 'move') item.parent = cur;
            else db.unshift({...item, id: Date.now()+Math.random(), name: item.name+'_副本', parent: cur});
        });
        cancelClip();
    }
    function handleUp(el) { if(el.files[0]) { db.unshift({id:Date.now(), name:el.files[0].name, isDir:false, parent:drivePath[drivePath.length-1], del:false, time:Date.now()}); render(); } }

    window.onload = render;
</script>
</body>
</html>
